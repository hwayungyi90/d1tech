<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../assets/css/common.css" />
    <link rel="stylesheet" href="./css/software.css" />
</head>
<body>
    <div class="wrapper">
        <div class="software">
            <div class="inner_container">
                <div class="inner_title aos-init aos-animate" data-aos="fade-up" data-aos-duration="1500">
                    <h3 class="section_title">Software</h3>
                    <p class="desc">소프트웨어</p>
                </div>
            </div>
            <div class="software_cont cont">
                <div class="inner_container">
                    <div class="software_main_img">
                        <div class="img_box">
                            <img src="../assets/images/software_main.png" alt="software page main image">
                        </div>
                        <p class="image_desc"> D1 Tech Corporation의 3D Printing Software는 원하시는 디자인의 구조물을 직접 출력이 가능합니다.<br class="pc_only"/>
                            컨트롤러 소프트웨어상에서는 모델을 출력 시 프린터의 너비, 높이, 길이를 수동으로 조정이 가능합니다.<br class="pc_only" />
                            또한, 인쇄 가능한 영역을 장비 범위 내에서 구상할 수 있으며, 건설현장에서 실제 출력할 수 있는 면적도 추정이 가능합니다.</p>
                    </div>
                    <div class="software_desc_img">
                        <div class="imgone_box">
                            <img src="../assets/images/software_img1.png" alt="software description image one">
                        </div>
                        <div class="imgtwo_box">
                            <img src="../assets/images/software_img2.png" alt="software description image two">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
